<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressum - BUGA Wuppertal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo-group">
                <div class="logo">
                    <!-- Logo der Stadt Wuppertal -->
                    <img src="Pic/Logo_wuppertal.png" alt="Logo" >
                </div>
                <div class="logo">
                    <h1><span>Bundesgartenschau</span> <span>Wuppertal</span></h1>
                </div>
            </div>
            <div class="dropdown" id="mainDropdown">
                <button class="dropdown-button">Menü</button>
                <div class="dropdown-menu">
                    <div class="menu-section">
                        <h3 class="menu-title">A-Frame</h3>
                        <a href="a-frame-Beispiele/index.html">Index</a>
                        <a href="a-frame-Beispiele/Beispiel1.html">Beispiel 1</a>
                        <a href="a-frame-Beispiele/Beispiel2.html">Beispiel 2</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Impressum</h1>
            <p>Rechtliche Informationen zur Bundesgartenschau Wuppertal</p>
        </section>

        <section style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
            
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <a href="index.html">Startseite</a>
            <a href="ueber-uns.html">Über uns</a>
            <a href="impressum.html">Impressum</a>
        </div>
    </footer>

    <script>
        // Dropdown-Menü Toggle
        document.getElementById('mainDropdown').addEventListener('click', function() {
            this.classList.toggle('active');
        });

        // Menü schließen wenn anderswo geklickt wird
        document.addEventListener('click', function(event) {
            const dropdown = document.getElementById('mainDropdown');
            if (!dropdown.contains(event.target)) {
                dropdown.classList.remove('active');
            }
        });
    </script>
</body>
</html>
